spring.application.name=geofichaje_jesusdavid

# Configuracion de la base de datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/geofichaje_jesusdavid
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Define GOOGLE_MAPS_API_KEY en tu entorno local antes de ejecutar la aplicacion.
app.google-maps-api-key=${GOOGLE_MAPS_API_KEY:}
